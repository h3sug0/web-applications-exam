{% macro book_form(book, genres, selected_genres, mode) %}
<form method="post" enctype="multipart/form-data" class="book-form">
    <div class="row g-3">
        <div class="col-md-8">
            <label class="form-label" for="title">Название</label>
            <input class="form-control" id="title" name="title" required value="{{ book.title or '' }}">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="year">Год</label>
            <input class="form-control" id="year" name="year" type="number" min="1" max="{{ current_year }}" required value="{{ book.year or '' }}">
        </div>
        <div class="col-md-6">
            <label class="form-label" for="publisher">Издательство</label>
            <input class="form-control" id="publisher" name="publisher" required value="{{ book.publisher or '' }}">
        </div>
        <div class="col-md-6">
            <label class="form-label" for="author">Автор</label>
            <input class="form-control" id="author" name="author" required value="{{ book.author or '' }}">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="page_count">Объём в страницах</label>
            <input class="form-control" id="page_count" name="page_count" type="number" min="1" required value="{{ book.page_count or '' }}">
        </div>
        <div class="col-md-8">
            <label class="form-label" for="genres">Жанры</label>
            <select class="form-select" id="genres" name="genres" multiple required size="4">
                {% for genre in genres %}
                    <option value="{{ genre.id }}" {% if genre.id in selected_genres %}selected{% endif %}>{{ genre.name }}</option>
                {% endfor %}
            </select>
        </div>
        {% if mode == 'create' %}
            <div class="col-12">
                <label class="form-label" for="cover">Обложка</label>
                <input class="form-control" id="cover" name="cover" type="file" accept="image/*" required>
            </div>
        {% endif %}
        <div class="col-12">
            <label class="form-label" for="description">Краткое описание</label>
            <textarea class="form-control js-markdown" id="description" name="description" rows="8">{{ book.description or '' }}</textarea>
        </div>
    </div>
    <div class="mt-4 d-flex gap-2">
        <button class="btn btn-primary" type="submit">Сохранить</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('books.index') }}">Отмена</a>
    </div>
</form>
{% endmacro %}
